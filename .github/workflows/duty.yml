name: Monthly Duty Report

on:
  schedule:
    - cron: '0 23 * * *'  # 每天UTC 23:00 尝试运行（北京时间早上7点）
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      # 只有每月1号运行发邮件逻辑
      - name: Check Date
        id: check_date
        run: |
          if [ "$(date +%d)" = "01" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_date.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        if: steps.check_date.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install pandas openpyxl
        
      - name: Run duty script
        if: steps.check_date.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          SENDER_EMAIL: ${{ secrets.EMAIL_SENDER }}
          SENDER_PWD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.EMAIL_RECEIVER }}
        run: python duty_report.py
