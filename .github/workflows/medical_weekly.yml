name: Weekly Medical Guidelines

on:
  schedule:
    - cron: '30 0 * * 1'
  workflow_dispatch:

jobs:
  run_guideline_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install requests googletrans==3.1.0a0
      - name: Run Script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          # 就是这一行！之前可能漏掉了，导致无法抓取 NewsAPI
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }} 
        run: python medical_guidelines.py
